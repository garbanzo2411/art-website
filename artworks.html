            <section class="gallery-section">
            <div class="gallery-container">
                <div class="gallery">
                    <div class="gallery-item" data-title="Pawns" data-description="Pawns depicts two generations facing one another across a chessboard, 
                                transforming an ordinary moment into a reflection on memory, pain, and cultural identity. The chess game becomes a metaphor 
                                for the relationship between my Bosnian heritage—a dialogue between past and present, knowledge and uncertainty, remembrance and healing. 
                                Each move represents the ongoing interaction between a younger generation seeking to understand a history shaped by war and an older generation 
                                carrying memories they would rather leave behind.">
                        <img src="artworks/chess.jpg" alt="Chess Masterpiece">
                        <div class="gallery-item-content">
                            <h3>Pawns</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Tea and Irma" data-description="Two cousins sharing a precious moment, celebrating family bonds and cultural connections.">
                        <img src="artworks/cousins.jpg" alt="Tea and Irma">
                        <div class="gallery-item-content">
                            <h3>Tea and Irma</h3>
                        </div>
                    </div>

                    <div class="gallery-item">
                        <img src="artworks/Prayer.jpg" alt="Prayer">
                        <div class="gallery-item-content">
                            <h3>Prayer</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Džezva" data-description="A beautiful mat with a traditional beverage in the center.">
                        <img src="artworks/Džezva.jpg" alt="Džezva">
                        <div class="gallery-item-content">
                            <h3>Džezva</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Grapes" data-description="Up close depiction of grapes, with the Bosnia crest in the top left corner.">
                        <img src="artworks/Grapes.jpg" alt="Grapes">
                        <div class="gallery-item-content">
                            <h3>Grapes</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Love Thy Neighbor" data-description="A room in Blues and Reds.">
                        <img src="artworks/LoveThyNeighbor.jpg" alt="Love Thy Neighbor">
                        <div class="gallery-item-content">
                            <h3>Love Thy Neighbor</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Better Days" data-description="A ran down Mostar Bridge.">
                        <img src="artworks/BetterDays.jpg" alt="Prayer">
                        <div class="gallery-item-content">
                            <h3>Better Days</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Crest of Bosnia" data-description="The iconic crest of Bosnia and Herzegovina.">
                        <img src="artworks/BosnaCrest.JPG" alt="Bosna Crest">
                        <div class="gallery-item-content">
                            <h3>Crest of Bosnia</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Gradacac" data-description="A scene of Gradacac.">
                        <img src="artworks/Gradacac .JPEG" alt="Gradacac">
                        <div class="gallery-item-content">
                            <h3>Gradacac</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Mostar" data-description="A painting showing off the iconic bridge of Mostar.">
                        <img src="artworks/Mostar.jpg" alt="Mostar">
                        <div class="gallery-item-content">
                            <h3>Mostar</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Tank Study" data-description="A powerful piece exploring themes of conflict and resilience, set against a surreal landscape that speaks to the complexity of war.">
                        <img src="artworks/tank.jpg" alt="Tank Study">
                        <div class="gallery-item-content">
                            <h3>Tank Study</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Tito" data-description="A portrait of Tito with blood splatter.">
                        <img src="artworks/Tito jpeg .JPEG" alt="Tito">
                        <div class="gallery-item-content">
                            <h3>Tito</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Grafitti" data-description="Grafitti across the painting.">
                        <img src="artworks/Grafitti.JPEG" alt="Grafitti">
                        <div class="gallery-item-content">
                            <h3>Grafitti</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Balkan Birthday" data-description="A celebratory scene from Yugoslavia, capturing the joy and community spirit that defines Balkan culture and traditions.">
                        <img src="artworks/yugoslavia.jpg" alt="Balkan Birthday">
                        <div class="gallery-item-content">
                            <h3>Balkan Birthday</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Kolo" data-description="Ladies hold hands and dance.">
                        <img src="artworks/kolo .JPEG" alt="Kolo">
                        <div class="gallery-item-content">
                            <h3>Kolo</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Bosnian House" data-description="A nostalgic depiction of traditional Bosnian architecture, representing home, heritage, and the enduring spirit of Bosnia.">
                        <img src="artworks/housepainting.jpg" alt="Bosnian House">
                        <div class="gallery-item-content">
                            <h3>Bosnian House</h3>
                        </div>
                    </div>

                    <div class="gallery-item" data-title="Digital Birthday" data-description="A celebratory scene from my birthday recently, capturing the joy and warmth of the occasion in a digital format.">
                        <img src="artworks/digitalbirthday.jpg" alt="Digital Birthday">
                        <div class="gallery-item-content">
                            <h3>Digital Birtday</h3>
                        </div>
                    </div>
